name: Bug report
description: Report a reproducible VonCMS bug.
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Use this for normal bugs and regressions. Do not open a public issue for a dangerous security vulnerability; contact the maintainer privately first.
  - type: input
    id: version
    attributes:
      label: VonCMS version
      placeholder: 'v1.25.1'
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Hosting or local stack
      placeholder: 'cPanel Apache/PHP 8.2/MySQL 8, Laragon, aaPanel Nginx, etc.'
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, logs, or console output
      description: Remove secrets, API keys, cookies, and private URLs before posting.
